<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Result</title>
    <link rel="stylesheet" href="result.css" />
  </head>
  <body>
    <div class="result-card">
      <div class="top">🎉 Exam Result</div>

      <div class="info">
        <p><b>Name:</b> <span id="rName"></span></p>
        <p><b>Class:</b> <span id="rClass"></span></p>
        <p><b>Roll No:</b> <span id="rRoll"></span></p>
      </div>

      <div class="marks">
        <div class="score" id="rMarks">0</div>
        <div class="total">out of <span id="rTotal">0</span></div>
      </div>

      <div class="msg">Keep Learning 👍</div>
    </div>

    <script src="result.js"></script>
  </body>
</html>
